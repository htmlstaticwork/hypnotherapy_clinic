<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HypnoClinic</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2F5D62',
                        secondary: '#F4F7F6',
                        darkBg: '#1E2D2F',
                        darkText: '#E6F0EE'
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-secondary dark:bg-darkBg text-primary dark:text-darkText font-inter h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white dark:bg-white/5 border border-primary/5 shadow-2xl rounded-[3rem] p-12 scroll-animate opacity-0">
        <div class="text-center mb-10">
            <a href="index.html" class="flex items-center justify-center space-x-2 mb-8">
                <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white">
                    <i data-lucide="brain-circuit"></i>
                </div>
                <span class="text-xl font-bold font-playfair uppercase tracking-wider">HypnoClinic</span>
            </a>
            <h1 class="text-3xl font-playfair font-bold mb-2 italic">Clinical Baseline.</h1>
            <p class="opacity-40 italic text-sm">Every new journey begins with an application.</p>
        </div>

        <form class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 text-xs font-bold uppercase tracking-widest italic opacity-40">Forename</label>
                    <input type="text" placeholder="Name" class="form-input" required>
                </div>
                <div>
                    <label class="block mb-2 text-xs font-bold uppercase tracking-widest italic opacity-40">Surname</label>
                    <input type="text" placeholder="Lastname" class="form-input" required>
                </div>
            </div>
            <div>
                <label class="block mb-2 text-xs font-bold uppercase tracking-widest italic opacity-40">Secure Identity</label>
                <input type="email" placeholder="Email" class="form-input" required>
            </div>
            <div class="relative">
                <label class="block mb-2 text-xs font-bold uppercase tracking-widest italic opacity-40">Establish Encryption</label>
                <input type="password" placeholder="Create Password" class="form-input" required>
                <button type="button" class="absolute top-10 right-4 opacity-40 hover:opacity-100"><i data-lucide="eye" class="w-4 h-4"></i></button>
            </div>
            <div class="flex items-center space-x-3 text-xs font-bold uppercase tracking-widest italic opacity-40">
                <input type="checkbox" checked class="w-4 h-4 bg-transparent border border-primary/20 rounded">
                <span>Agree to confidentiality protocol.</span>
            </div>
            <button type="button" onclick="window.location.href='dashboard.html'" class="w-full btn-primary py-5 rounded-full font-bold text-lg italic shadow-xl">Apply for Dashboard</button>
        </form>

        <div class="my-10 flex items-center space-x-6 opacity-10">
             <div class="h-px bg-primary w-full"></div>
             <span class="text-xs uppercase font-bold tracking-[0.5em] italic">Or</span>
             <div class="h-px bg-primary w-full"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="border border-primary/20 p-4 rounded-3xl flex items-center justify-center hover:bg-primary/5 transition-all">
                <i data-lucide="chrome" class="w-5 h-5 mr-3"></i>
                <span class="text-xs font-bold uppercase tracking-widest italic">Google</span>
            </button>
            <button class="border border-primary/20 p-4 rounded-3xl flex items-center justify-center hover:bg-primary/5 transition-all">
                <i data-lucide="apple" class="w-5 h-5 mr-3"></i>
                <span class="text-xs font-bold uppercase tracking-widest italic">Apple</span>
            </button>
        </div>

        <p class="mt-12 text-center text-xs opacity-40 italic">Known to us? <a href="login.html" class="font-bold underline italic hover:text-primary transition-all">Recall existing session</a></p>
    </div>

    <!-- Theme/RTL Utilities -->
    <div class="fixed bottom-10 right-10 flex space-x-4">
         <button id="theme-toggle" class="p-3 bg-white dark:bg-white/5 rounded-full shadow-xl"><i data-lucide="moon" class="w-6 h-6"></i></button>
         <button id="rtl-toggle" class="p-3 bg-white dark:bg-white/5 rounded-full shadow-xl"><i data-lucide="languages" class="w-6 h-6"></i></button>
    </div>

    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
