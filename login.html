<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HypnoClinic</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2F5D62',
                        secondary: '#F4F7F6',
                        darkBg: '#1E2D2F',
                        darkText: '#E6F0EE'
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page bg-secondary dark:bg-darkBg text-primary dark:text-darkText font-inter min-h-screen flex items-center justify-center p-4 py-12">

    <div class="w-full max-w-md bg-white dark:bg-white/5 border border-primary/5 shadow-2xl rounded-[3rem] p-12">
        <div class="text-center mb-10">
            <a href="index.html" class="flex items-center justify-center space-x-2 mb-8">
                <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white">
                    <i data-lucide="brain-circuit"></i>
                </div>
                <span class="text-xl font-bold font-playfair uppercase tracking-wider">HypnoClinic</span>
            </a>
            <h1 class="text-3xl font-playfair font-bold mb-2 ">Welcome back.</h1>
            <p class="auth-subtitle text-sm">Enter the sanctuary of your mind.</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="auth-label block mb-2 text-xs font-bold uppercase tracking-widest">Identity Address</label>
                <input type="email" placeholder="Email" class="form-input" required>
            </div>
            <div class="relative">
                <label class="auth-label block mb-2 text-xs font-bold uppercase tracking-widest">Encryption Key</label>
                <div class="relative">
                    <input type="password" placeholder="Password" class="form-input" required>
                    <button type="button" class="auth-icon-button absolute inset-y-0 right-4 flex items-center"><i data-lucide="eye" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="auth-meta flex items-center justify-between text-xs font-bold uppercase tracking-widest">
                <div class="flex items-center space-x-2">
                    <input type="checkbox" class="w-4 h-4 bg-transparent border border-primary/20 rounded">
                    <span>Remember</span>
                </div>
                <a href="#" class="auth-link hover:underline">Forgot Key?</a>
            </div>

            <button type="button" onclick="window.location.href='#'" class="w-full btn-primary py-5 rounded-full font-bold text-lg  shadow-xl">Login</button>
        </form>

        <div class="auth-divider my-10 flex items-center space-x-6">
             <div class="h-px bg-primary w-full"></div>
             <span class="text-xs uppercase font-bold tracking-[0.5em] ">Or</span>
             <div class="h-px bg-primary w-full"></div>
        </div>

        <div class="flex items-center justify-center gap-3 flex-nowrap">
            <button class="auth-social-btn border border-primary/20 w-12 h-12 rounded-2xl flex items-center justify-center transition-all shrink-0" aria-label="Continue with Google">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="auth-social-icon w-5 h-5">
                    <path fill="currentColor" d="M21.805 10.023H12.25v3.955h5.488c-.236 1.27-.955 2.347-2.021 3.067v2.544h3.273c1.916-1.764 3.015-4.36 3.015-7.439 0-.719-.064-1.411-.2-2.127Z"/>
                    <path fill="currentColor" d="M12.25 22c2.734 0 5.029-.903 6.705-2.411l-3.273-2.544c-.903.612-2.057.979-3.432.979-2.638 0-4.875-1.78-5.672-4.175H3.193v2.622A10.121 10.121 0 0 0 12.25 22Z"/>
                    <path fill="currentColor" d="M6.578 13.849a6.075 6.075 0 0 1-.317-1.849c0-.64.113-1.261.317-1.849V7.529H3.193A10.12 10.12 0 0 0 2.125 12c0 1.633.39 3.177 1.068 4.471l3.385-2.622Z"/>
                    <path fill="currentColor" d="M12.25 5.976c1.488 0 2.825.513 3.878 1.519l2.897-2.897C17.274 2.964 14.979 2 12.25 2 8.222 2 4.725 4.315 3.193 7.529l3.385 2.622c.797-2.395 3.034-4.175 5.672-4.175Z"/>
                </svg>
            </button>
            <button class="auth-social-btn border border-primary/20 w-12 h-12 rounded-2xl flex items-center justify-center transition-all shrink-0" aria-label="Continue with Facebook">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="auth-social-icon w-5 h-5">
                    <path fill="currentColor" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.026 4.388 11.022 10.125 11.927v-8.437H7.078v-3.49h3.047V9.413c0-3.03 1.792-4.702 4.533-4.702 1.313 0 2.686.236 2.686.236v2.974H15.83c-1.49 0-1.955.931-1.955 1.887v2.265h3.328l-.532 3.49h-2.796V24C19.612 23.095 24 18.099 24 12.073Z"/>
                </svg>
            </button>
            <button class="auth-social-btn border border-primary/20 w-12 h-12 rounded-2xl flex items-center justify-center transition-all shrink-0" aria-label="Continue with Apple">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="auth-social-icon w-5 h-5">
                    <path fill="currentColor" d="M15.7 2.2c0 1-.4 1.9-1.1 2.5-.8.7-1.6 1-2.6.9-.1-1 .3-1.8 1-2.5.7-.7 1.5-1 2.5-1 .1 0 .2 0 .2.1Zm4.1 15.3c-.4 1-1 1.8-1.6 2.5-.7.8-1.4 1.2-2.2 1.2-.5 0-1.1-.1-1.9-.4-.7-.3-1.4-.4-1.8-.4-.5 0-1.1.1-1.9.4-.7.3-1.3.4-1.8.4-.8 0-1.6-.4-2.3-1.2-.7-.8-1.3-1.7-1.8-2.8-.5-1.1-.8-2.2-.8-3.3 0-1.3.3-2.4.9-3.3.6-.9 1.5-1.4 2.5-1.4.6 0 1.3.2 2.1.5.7.3 1.3.5 1.6.5.2 0 .8-.2 1.7-.6.9-.3 1.7-.5 2.3-.4 1.7.1 3 .8 3.8 2.1-1.5.9-2.3 2.2-2.3 3.8 0 1.3.5 2.4 1.4 3.2.4.4.9.7 1.4.8-.1.3-.2.6-.3.9Z"/>
                </svg>
            </button>
        </div>

        <p class="auth-footer-copy mt-12 text-center text-xs">New here? <a href="signup.html" class="auth-link font-bold hover:underline underline-offset-4 transition-all">Apply for clinical baseline</a></p>
    </div>

    <!-- Theme/RTL Utilities -->
    <div class="fixed top-4 right-4 md:top-8 md:right-8 flex items-center space-x-2 md:space-x-6 z-[100]">
         <button id="theme-toggle" class="p-1.5 md:p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-colors">
              <i data-lucide="moon" class="w-5 h-5"></i>
         </button>
         <button id="rtl-toggle" class="p-1.5 md:p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition-colors">
              <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
         </button>
    </div>

            <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
